<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My favorite BGM</title>
  <link rel="icon" type="image/png" href="./Photo Folder/favicon.jpeg">

  <!-- PWA / iOS Web App 対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My BGM">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#071a0e">

  <!-- iOS ホーム画面アイコン -->
  <link rel="apple-touch-icon" href="./Photo Folder/favicon.jpeg">
  <link rel="manifest" id="manifest-placeholder">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');

    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-bg-strong: rgba(255, 255, 255, 0.14);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-border-light: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      --glass-shadow-deep: 0 20px 60px rgba(0, 0, 0, 0.45);
      --blur: blur(28px) saturate(180%);
      --blur-strong: blur(40px) saturate(200%);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --accent: rgba(100, 230, 160, 0.85);
      --accent-glow: rgba(80, 200, 130, 0.3);
      --font: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #050f08;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    /* ── Animated background orbs ── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift linear infinite;
    }

    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #1a6e3a 0%, #0d4020 60%, transparent 100%);
      top: -15%; left: -10%;
      animation-duration: 22s;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #2dbd72 0%, #127040 60%, transparent 100%);
      top: 30%; right: -8%;
      animation-duration: 18s;
      animation-delay: -7s;
    }
    .orb-3 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #0e8c4a 0%, #064d28 60%, transparent 100%);
      bottom: -20%; left: 20%;
      animation-duration: 26s;
      animation-delay: -13s;
    }
    .orb-4 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #4ecb8d 0%, #1a7a46 60%, transparent 100%);
      top: 55%; left: 5%;
      animation-duration: 20s;
      animation-delay: -4s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(40px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 50px) scale(0.95); }
      75% { transform: translate(30px, 20px) scale(1.02); }
    }

    /* ── Noise texture overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
    }

    /* ── Layout ── */
    .page-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: calc(env(safe-area-inset-top) + 16px) 28px 16px;
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      background: rgba(5, 15, 8, 0.55);
      border-bottom: 1px solid var(--glass-border-light);
      box-shadow: 0 1px 0 rgba(255,255,255,0.06), var(--glass-shadow);
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }

    header nav p {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Glass Card ── */
    .glass-card {
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.15);
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease,
                  background 0.3s ease;
    }

    /* Specular highlight top edge */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.5) 60%, transparent);
      border-radius: 50%;
    }

    /* Inner glow bottom */
    .glass-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to top, rgba(255,255,255,0.03), transparent);
      border-radius: 0 0 20px 20px;
      pointer-events: none;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--glass-border-light);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* ── Track row ── */
    .track {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      margin-bottom: 10px;
      transition: background 0.2s ease, transform 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .track:last-child { margin-bottom: 0; }

    .track::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--accent), rgba(120,200,255,0.2));
      border-radius: 3px 0 0 3px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .track:hover { background: rgba(255,255,255,0.09); }
    .track:hover::before { opacity: 1; }

    @media (hover: none) {
      .track:hover { background: rgba(255,255,255,0.05); }
      .track:active { background: rgba(255,255,255,0.1); transform: scale(0.99); }
    }

    .track-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.1px;
    }

    /* ── Audio element ── */
    audio {
      width: 100%;
      height: 36px;
      border-radius: 8px;
      outline: none;
      display: block;
      accent-color: var(--accent);
      filter: invert(0);
    }

    /* WebKit audio controls tinting */
    audio::-webkit-media-controls-panel {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 8px;
    }
    audio::-webkit-media-controls-play-button,
    audio::-webkit-media-controls-mute-button {
      filter: invert(1) brightness(0.9);
    }
    audio::-webkit-media-controls-timeline,
    audio::-webkit-media-controls-volume-slider {
      accent-color: rgba(120,200,255,0.9);
    }
    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display {
      color: rgba(255,255,255,0.7);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px 20px calc(env(safe-area-inset-bottom) + 24px);
      color: var(--text-tertiary);
      font-size: 12px;
      letter-spacing: 0.3px;
      border-top: 1px solid var(--glass-border-light);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(5,15,8,0.4);
    }

    footer p { margin: 3px 0; }

    /* ── Tablet ── */
    @media (min-width: 600px) {
      main { padding: 32px 24px; gap: 24px; }
      .glass-card { padding: 28px 24px; border-radius: 24px; }
    }

    /* ── Desktop ── */
    @media (min-width: 1025px) {
      main {
        padding: 40px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        align-items: start;
      }
      .glass-card { border-radius: 28px; }
    }

    /* ── Entry animations ── */
    .glass-card {
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .glass-card:nth-child(1) { animation-delay: 0.05s; }
    .glass-card:nth-child(2) { animation-delay: 0.12s; }
    .glass-card:nth-child(3) { animation-delay: 0.19s; }
    .glass-card:nth-child(4) { animation-delay: 0.26s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    header {
      animation: fadeDown 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <!-- Animated background -->
  <div class="bg-scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <div class="page-wrapper">
    <!-- Header -->
    <header>
      <h1>My favorite BGM</h1>
      <nav><p>Made by sh1n*</p></nav>
    </header>

    <!-- Main -->
    <main>

      <div class="glass-card">
        <p class="card-title">しゃろう</p>
        <p class="card-subtitle">Music</p>
        <div class="track">
          <span class="track-name">superstar</span>
          <audio src="./Music Folder/0101.mp3" controls loop></audio>
        </div>
        <div class="track">
          <span class="track-name">You and Me</span>
          <audio src="./Music Folder/0102.mp3" controls loop></audio>
        </div>
        <div class="track">
          <span class="track-name">Cassette Tape Dream</span>
          <audio src="./Music Folder/0103.mp3" controls loop></audio>
        </div>
      </div>

      <div class="glass-card">
        <p class="card-title">騒音のない世界</p>
        <p class="card-subtitle">Music</p>
        <div class="track">
          <span class="track-name">それゆけワンダーランド</span>
          <audio src="./Music Folder/0201.mp3" controls loop></audio>
        </div>
        <div class="track">
          <span class="track-name">裸の王様</span>
          <audio src="./Music Folder/0202.mp3" controls loop></audio>
        </div>
      </div>

      <div class="glass-card">
        <p class="card-title">プロセカ</p>
        <p class="card-subtitle">Music</p>
        <div class="track">
          <span class="track-name">Mr. Showtime（Vocal OFF）</span>
          <audio src="./Music Folder/0301.mp3" controls loop></audio>
        </div>
      </div>

      <div class="glass-card">
        <p class="card-title">集客BGM</p>
        <p class="card-subtitle">Music</p>
        <div class="track">
          <span class="track-name">呼び込みくん</span>
          <audio src="./Music Folder/0401.mp3" controls loop></audio>
        </div>
        <div class="track">
          <span class="track-name">排除くん</span>
          <audio src="./Music Folder/0402.mp3" controls loop></audio>
        </div>
      </div>

    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; sh1n*</p>
    </footer>
  </div>

  <script>
    // ── Web App Manifest (Blob) ──
    const manifestData = {
      name: "My favorite BGM",
      short_name: "My BGM",
      description: "sh1n* のお気に入りBGMプレイヤー",
      start_url: "./index.html",
      display: "standalone",
      background_color: "#050f08",
      theme_color: "#050f08",
      orientation: "portrait-primary",
      icons: [
        { src: "./Photo Folder/favicon.jpeg", sizes: "192x192", type: "image/jpeg", purpose: "any maskable" },
        { src: "./Photo Folder/favicon.jpeg", sizes: "512x512", type: "image/jpeg", purpose: "any maskable" }
      ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
    document.getElementById('manifest-placeholder').href = URL.createObjectURL(manifestBlob);

    // ── Service Worker (Blob) ──
    if ('serviceWorker' in navigator) {
      const CACHE_NAME = 'my-bgm-v2';
      const swCode = `
        const CACHE_NAME = '${CACHE_NAME}';
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
          ));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          if (e.request.url.endsWith('.mp3')) {
            e.respondWith(fetch(e.request)); return;
          }
          e.respondWith(
            caches.open(CACHE_NAME).then(cache =>
              cache.match(e.request).then(cached => {
                const fetched = fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; });
                return cached || fetched;
              })
            )
          );
        });
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: './' })
        .then(r => console.log('SW registered:', r.scope))
        .catch(e => console.warn('SW failed:', e));
    }
  </script>
</body>
</html>
